name: QODER Weekly Agent Run

on:
  schedule:
    # 每周一 09:00 北京时间 = UTC 01:00 Monday
    - cron: '0 1 * * 1'
  workflow_dispatch:
    inputs:
      agent:
        description: 'Run specific agent (leave empty for all)'
        required: false

jobs:
  run-agents:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run QODER Dispatcher
        env:
          TZ: 'Asia/Shanghai'
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          echo "====================================="
          echo "QODER Agent Dispatcher v3.0 - AI Powered"
          echo "Triggered at: $(date '+%Y-%m-%d %H:%M %Z')"
          echo "====================================="

          if [ "${{ inputs.agent }}" != "" ]; then
            node scripts/agent-dispatcher.cjs --agent=${{ inputs.agent }}
          else
            node scripts/agent-dispatcher.cjs --parallel
          fi

      - name: Check for new blog posts
        run: |
          echo "---"
          echo "Blog posts this week:"
          ls -la src/content/blog/ | tail -5

      - name: Check for new social content
        run: |
          echo "---"
          echo "Social content this week:"
          ls -la content/social/pinterest/ 2>/dev/null || echo "No content yet"

      - name: Commit new content
        run: |
          git config --local user.email "qoder@yaopulife.com"
          git config --local user.name "QODER Agent"

          # Only commit if there are changes
          if git diff --quiet; then
            echo "No content changes to commit"
          else
            git add src/content/blog/ content/social/ ops/state/
            git commit -m "chore: QODER weekly content run $(date '+%Y-%m-%d')

Generated by GitHub Actions - QODER Agent Dispatcher
[skip ci]"

            if [ "${{ secrets.GH_TOKEN }}" != "" ]; then
              git push
              echo "Content pushed to repository"
            else
              echo "No GH_TOKEN configured - content ready for manual push"
              git status
            fi
          fi

      - name: Upload reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: qoder-weekly-report-$(date '+%Y%m%d')
          path: |
            ops/reports/*.md
            ops/state/pipeline-state.json
          retention-days: 30